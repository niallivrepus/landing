<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Jokuh — communities, identity, and expression in one humane layer."
    />
    <title>Jokuh</title>
  </head>
  <body>
    <script>
      (function () {
        var k = "jokuh-landing-theme-v2";
        var stored = null;
        try {
          stored = localStorage.getItem(k);
        } catch (e) {}
        var resolved =
          stored === "dark" || stored === "light"
            ? stored
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        var root = document.documentElement;
        root.classList.remove("light", "dark");
        root.classList.add(resolved);
        root.setAttribute("data-theme", resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta)
          meta.setAttribute("content", resolved === "dark" ? "#000000" : "#ffffff");
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
