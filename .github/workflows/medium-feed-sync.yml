name: Sync Medium RSS

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch Medium RSS
        env:
          MEDIUM_RSS_URL: ${{ secrets.MEDIUM_RSS_URL }}
        run: node scripts/sync-medium.mjs
      - name: Commit feed if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync Medium feed"
          file_pattern: src/data/medium-feed.json
